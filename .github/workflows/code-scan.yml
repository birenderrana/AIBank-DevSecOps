#Scan backend + frontend + configs for security vulnerabilities.Will use Sonaqube(SAST)
name: SAST - Semgrep

on:
  workflow_call:

jobs:
  sast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/java
            p/owasp-top-ten
            p/secrets