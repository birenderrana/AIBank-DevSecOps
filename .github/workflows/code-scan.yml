#Scan backend + frontend + configs for security vulnerabilities.Will use Sonaqube(SAST)

name: Code Scan

on:
    workflow_call:

jobs:
    code-scan:
        runs-on: self-hosted
        steps:
         - uses: actions/checkout@v3
         - name: Set up Java
           uses: actions/setup-java@v3
           with:
             distribution: 'temurin'
             java-version: '21'
         - name: SonarQube Scan
           uses: SonarSource/sonarqube-scan-action@v2
           with:
             projectKey: 'springboot-app'
             projectName: 'springboot-app'