#Scan backend + frontend + configs for security vulnerabilities.Will use Sonaqube(SAST)

name: Code Scan

on:
    workflow_call:

jobs:
    code-scan:
        runs-on: ubuntu-latest
        steps:
         - uses: actions/checkout@v4
           with:
            fetch-depth: 0

         - name: Set up Java
           uses: actions/setup-java@v3
           with:
             distribution: 'temurin'
             java-version: '21'

         - name: SonarQube Scan
           env:
             SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
           run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=birenderrana_ai-bank-devsecops
            