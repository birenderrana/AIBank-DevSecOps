#Prevents vulnerable libraries from entering your container.
name: Dependency Scan

on:
  workflow_call:

jobs:
  dependency_scan:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install OWASP Dependency-Check CLI
        run: |
          wget https://github.com/jeremylong/DependencyCheck/releases/download/v8.2.1/dependency-check-8.2.1-release.zip
          unzip dependency-check-8.2.1-release.zip
          export PATH=$PATH:$PWD/dependency-check

      - name: Run Dependency Check
        run: |
          dependency-check.sh --project "springboot-app" --scan ./ --format "ALL"